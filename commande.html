<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmation de Commande</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">

  <style>
    body {
      font-family: "Arial", sans-serif;
      background-color: #f8f8f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
      background-color: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    .cart-details {
      background-color: #f4f4f4;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
    }

    .cart-details ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    .cart-details li {
      padding: 8px 0;
      border-bottom: 1px solid #ddd;
    }

    .total-price {
      font-size: 18px;
      font-weight: bold;
      margin-top: 12px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: 600;
    }

    .payment-message {
      margin-top: 18px;
      font-weight: bold;
      background: #f4f4f4;
      padding: 12px;
      border-radius: 8px;
    }

    .submit-button {
      background-color: #28a745;
      color: white;
      padding: 15px;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      margin-top: 10px;
    }

    .submit-button:hover {
      background-color: #218838;
    }

    .back-button {
      background-color: #007bff;
      color: white;
      padding: 15px;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      margin-top: 20px;
      text-align: center;
    }

    .back-button:hover {
      background-color: #0056b3;
    }
  </style>

  <script>
    function fillCartDetails() {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      let cartDetailsHTML = "";
      let cartDetailsText = "";
      let total = 0;

      cart.forEach(item => {
        const q = item.quantity || 1;
        cartDetailsHTML += `<li>${item.product} - ${Number(item.price).toFixed(2)} € (Quantité: ${q})</li>`;
        cartDetailsText += `- ${item.product} | ${Number(item.price).toFixed(2)} € | Quantité: ${q}\n`;
        total += Number(item.price) * q;
      });

      if (cart.length === 0) {
        cartDetailsHTML = "<li>Panier vide</li>";
        cartDetailsText = "Panier vide";
      }

      document.getElementById("cartDetails").innerHTML = cartDetailsHTML;
      document.getElementById("cartTotal").innerHTML = `Total : ${total.toFixed(2)} €`;

      // Champs cachés envoyés dans l'email
      document.getElementById("cart_data").value = cartDetailsText;
      document.getElementById("cart_total").value = total.toFixed(2) + " €";
      document.getElementById("payment_method").value = "Paiement sur place";
    }

    function validateBeforeSend(event) {
      // On valide pour éviter d’envoyer un formulaire vide/incorrect
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const address = document.getElementById("address").value.trim();

      const nameRegex = /^[a-zA-ZÀ-ÿ\s'-]+$/;
      const phoneRegex = /^0[6-7]\d{8}$/;

      if (!nameRegex.test(name)) {
        alert("Veuillez entrer un nom valide.");
        event.preventDefault();
        return false;
      }
      if (!phoneRegex.test(phone)) {
        alert("Veuillez entrer un numéro valide (06/07 + 8 chiffres).");
        event.preventDefault();
        return false;
      }
      if (!email) {
        alert("Veuillez entrer un email valide.");
        event.preventDefault();
        return false;
      }
      if (!address) {
        alert("Veuillez entrer une adresse valide.");
        event.preventDefault();
        return false;
      }

      // Si panier vide, on bloque (optionnel)
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      if (cart.length === 0) {
        alert("Votre panier est vide.");
        event.preventDefault();
        return false;
      }

      return true;
    }
  </script>
    </head>

    <body onload="fillCartDetails()">
    <div class="container">
        <h2>Confirmation de votre commande</h2>

        <div class="cart-details">
        <h4>Panier</h4>
        <ul id="cartDetails"></ul>
        <p id="cartTotal" class="total-price"></p>
        </div>


        <form
        id="contactForm"
        action="https://formspree.io/f/mwvreljd"
        method="POST"
        >
        <div class="form-group">
            <label for="name">Nom :</label>
            <input class="w3-input" type="text" id="name" name="Nom" required />
        </div>

        <div class="form-group">
            <label for="email">Email :</label>
            <input class="w3-input" type="email" id="email" name="Email" required />
        </div>

        <div class="form-group">
            <label for="phone">Téléphone :</label>
            <input
            class="w3-input"
            type="text"
            id="phone"
            name="Téléphone"
            placeholder="06XXXXXXXX ou 07XXXXXXXX"
            required
            pattern="^0[6-7]\d{8}$"
            title="Le numéro doit commencer par 06 ou 07, suivi de 8 chiffres."
            />
        </div>

        <div class="form-group">
            <label for="address">Adresse :</label>
            <input class="w3-input" type="text" id="address" name="Adresse" required />
        </div>

        <div class="form-group">
            <label for="message">Message :</label>
            <textarea class="w3-input" id="message" name="Message" placeholder="Informations utiles (ex: détails, étage, etc.)" required></textarea>
        </div>

        <p class="payment-message">Mode de paiement : <strong>Paiement sur place</strong></p>

        <!-- Champs cachés -->
        <input type="hidden" id="cart_data" name="Panier" />
        <input type="hidden" id="cart_total" name="Total" />
        <input type="hidden" id="payment_method" name="Paiement" />

        <button type="submit" class="submit-button">Confirmer la commande</button>
        </form>

        <button class="back-button" onclick="window.location.href='index.html'">
        Retour à la page principale
        </button>

        <div id="successMessage" style="display:none; margin-top:20px; padding:15px; background:#d4edda; color:#155724; border-radius:8px; text-align:center;">
            ✅ Votre commande a été envoyée avec succès ! Redirection vers l'accueil...
            
        </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("contactForm");

    form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const formData = new FormData(form);

        try {
        const res = await fetch(form.action, {
            method: "POST",
            body: formData,
            headers: { "Accept": "application/json" }
        });

        if (res.ok) {

            // vider le panier
            localStorage.removeItem("cart");

            // afficher message succès
            document.getElementById("successMessage").style.display = "block";

            // redirection après 2 secondes
            setTimeout(() => {
            window.location.href = "index.html";
            }, 2000);

        } else {
            alert("Erreur : la commande n'a pas pu être envoyée.");
        }

        } catch (err) {
        console.error(err);
        alert("Erreur réseau.");
        }
    });
    });
    </script>
</body>
</html>
